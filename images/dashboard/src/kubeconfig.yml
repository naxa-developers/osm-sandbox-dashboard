---
apiVersion: v1
clusters:
- cluster:
    certificate-authority-data: your_certificate_authority_data_here
    server: https://k3d-mycluster-serverlb:6443
  name: k3d-mycluster
contexts:
- context:
    cluster: k3d-mycluster
    user: admin@k3d-mycluster
  name: k3d-mycluster
current-context: k3d-mycluster
kind: Config
preferences: {}
users:
- name: admin@k3d-mycluster
  user:
    client-certificate-data: your_client_certificate_data_here
    client-key-data: your_client_key_data_here
